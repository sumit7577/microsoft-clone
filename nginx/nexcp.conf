# ── panel.yourdomain.com ──────────────────────────────────────────────────────
# Control panel — served directly from static files + API proxied to Node
server {
    listen 80;
    server_name panel.yourdomain.com;

    # Serve panel static files directly
    root /opt/nexcp/frontend-panel;
    index index.html;

    # All /api/* requests → Node backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Mail page served from panel frontend
    location /mail {
        try_files /mail.html =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── link.yourdomain.com ───────────────────────────────────────────────────────
# Device link page — its own static frontend + proxied API
server {
    listen 80;
    server_name link.yourdomain.com;

    root /opt/nexcp/frontend-link;
    index index.html;

    # Only the link API routes are needed on this domain
    location /api/link/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
# AFTER INSTALL — run this to get SSL for both domains in one command:
#
#   sudo certbot --nginx \
#     -d panel.yourdomain.com \
#     -d link.yourdomain.com \
#     --non-interactive --agree-tos \
#     -m you@yourdomain.com
#
# Certbot will automatically add HTTPS server blocks and redirect HTTP → HTTPS.
# ──────────────────────────────────────────────────────────────────────────────
