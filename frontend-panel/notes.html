<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>OneNote</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --purple: #7719aa;
            --purple-dark: #5b1080;
            --purple-light: #f3e8f9;
            --bg: #f6f6f6;
            --bg2: #eee;
            --bg3: #e0e0e0;
            --border: #e1dfdd;
            --border2: #d2d0ce;
            --text: #242424;
            --text2: #616161;
            --text3: #8a8886;
            --blue: #0078d4;
            --red: #d13438;
            --green: #107c10;
            --r: 4px;
        }

        html,
        body {
            height: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            font-size: 14px;
            color: var(--text);
            background: #fff
        }

        body {
            display: flex;
            flex-direction: column
        }

        /* ── Topbar ─────────────────────────── */
        .topbar {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            background: var(--purple);
            flex-shrink: 0;
        }

        .topbar .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none
        }

        .topbar .brand svg {
            width: 22px;
            height: 22px
        }

        .topbar .brand-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff
        }

        .topbar .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, .15);
            border: 1px solid rgba(255, 255, 255, .25);
            border-radius: var(--r);
            padding: 5px 12px;
            flex: 1;
            max-width: 460px;
            margin: 0 auto;
        }

        .topbar .search-box:focus-within {
            background: rgba(255, 255, 255, .25);
            border-color: rgba(255, 255, 255, .5)
        }

        .topbar .search-box svg {
            width: 14px;
            height: 14px;
            color: rgba(255, 255, 255, .7);
            flex-shrink: 0
        }

        .topbar .search-box input {
            background: none;
            border: none;
            font-size: 13px;
            outline: none;
            width: 100%;
            font-family: inherit;
            color: #fff
        }

        .topbar .search-box input::placeholder {
            color: rgba(255, 255, 255, .6)
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto
        }

        .topbar-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255, 255, 255, .8)
        }

        .topbar-icon:hover {
            background: rgba(255, 255, 255, .15)
        }

        .topbar-icon svg {
            width: 18px;
            height: 18px
        }

        .topbar-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        /* ── Layout ─────────────────────────── */
        .main-wrap {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        /* ── Notebook sidebar ───────────────── */
        .nb-sidebar {
            width: 200px;
            flex-shrink: 0;
            background: #fff;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .nb-list {
            flex: 1;
            padding: 8px 0
        }

        .nb-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 14px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text2);
            border-left: 4px solid transparent;
            transition: all .1s;
        }

        .nb-item:hover {
            background: var(--bg);
            color: var(--text)
        }

        .nb-item.active {
            background: var(--purple-light);
            border-left-color: var(--purple);
            color: var(--purple);
            font-weight: 600
        }

        .nb-color {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            flex-shrink: 0
        }

        .nb-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .nb-add {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 14px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--purple);
            cursor: pointer;
        }

        .nb-add:hover {
            background: var(--purple-light)
        }

        .nb-add svg {
            width: 14px;
            height: 14px
        }

        /* ── Section / page sidebar ─────────── */
        .sec-sidebar {
            width: 240px;
            flex-shrink: 0;
            background: #faf9f8;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sec-header {
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .sec-add-page {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            font-size: 13px;
            color: var(--purple);
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }

        .sec-add-page:hover {
            background: var(--purple-light)
        }

        .sec-add-page svg {
            width: 14px;
            height: 14px
        }

        .sec-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-shrink: 0
        }

        .sec-tab {
            padding: 8px 14px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            color: var(--text2);
            border-bottom: 2px solid transparent;
            transition: all .1s;
        }

        .sec-tab:hover {
            color: var(--text);
            background: var(--bg)
        }

        .sec-tab.active {
            color: var(--purple);
            border-bottom-color: var(--purple);
            font-weight: 600
        }

        .page-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0
        }

        .page-item {
            padding: 8px 14px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text2);
            border-left: 3px solid transparent;
            transition: all .1s;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .page-item:hover {
            background: var(--bg);
            color: var(--text)
        }

        .page-item.active {
            background: var(--purple-light);
            border-left-color: var(--purple);
            color: var(--text)
        }

        .page-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .page-date {
            font-size: 11px;
            color: var(--text3)
        }

        .page-item.active .page-title {
            font-weight: 600
        }

        .sec-group {
            padding: 6px 14px 4px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text3);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .sec-group svg {
            width: 10px;
            height: 10px;
            transition: transform .15s
        }

        .sec-group.collapsed svg {
            transform: rotate(-90deg)
        }

        /* ── Content area ───────────────────── */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #fff
        }

        .content-toolbar {
            display: flex;
            align-items: center;
            padding: 6px 16px;
            gap: 4px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: #fff;
        }

        .tb-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: var(--r);
            cursor: pointer;
            border: none;
            background: none;
            color: var(--text2);
            font-size: 14px;
            transition: all .1s;
        }

        .tb-btn:hover {
            background: var(--bg2);
            color: var(--text)
        }

        .tb-btn.active {
            background: var(--purple-light);
            color: var(--purple)
        }

        .tb-sep {
            width: 1px;
            height: 22px;
            background: var(--border2);
            margin: 0 4px
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px 40px;
        }

        .page-content-title {
            font-size: 22px;
            font-weight: 600;
            border: none;
            outline: none;
            width: 100%;
            padding: 0 0 8px;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--purple);
            color: var(--text);
            font-family: inherit;
        }

        .page-content-html {
            min-height: 300px;
            font-size: 14px;
            line-height: 1.7;
            color: var(--text);
            outline: none;
        }

        .page-content-html table {
            border-collapse: collapse;
            margin: 12px 0
        }

        .page-content-html td,
        .page-content-html th {
            border: 1px solid var(--border2);
            padding: 4px 8px;
            font-size: 13px
        }

        .page-content-html img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 8px 0
        }

        .page-content-html h1,
        .page-content-html h2,
        .page-content-html h3 {
            margin: 16px 0 8px
        }

        .page-content-html ul,
        .page-content-html ol {
            margin-left: 24px
        }

        .page-content-html a {
            color: var(--blue)
        }

        /* empty / loading states */
        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            color: var(--text2);
            padding: 60px;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            color: var(--border2);
            margin-bottom: 8px
        }

        /* ── Gate ────────────────────────────── */
        .gate {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            background: #faf9f8;
        }

        /* ── Utils ───────────────────────────── */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border2);
            border-top-color: var(--purple);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border: 1px solid var(--green);
            border-radius: var(--r);
            padding: 10px 18px;
            font-size: 12.5px;
            color: var(--green);
            z-index: 9999;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .1);
        }

        .hidden {
            display: none !important
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: var(--r);
            font-size: 13px;
            cursor: pointer;
            border: 1px solid var(--border2);
            background: #fff;
            color: var(--text);
            transition: all .12s;
            font-family: inherit;
        }

        .btn:hover {
            background: var(--bg)
        }

        .btn-primary {
            background: var(--purple);
            border-color: var(--purple);
            color: #fff
        }

        .btn-primary:hover {
            background: var(--purple-dark)
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: #d2d0ce;
            border-radius: 3px
        }

        /* ── Context menu ────────────────────── */
        .ctx-menu {
            position: fixed;
            background: #fff;
            border: 1px solid var(--border2);
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .12);
            min-width: 180px;
            z-index: 200;
            padding: 4px 0;
        }

        .ctx-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            font-size: 13px;
            color: var(--text);
            cursor: pointer;
            transition: background .1s;
        }

        .ctx-item:hover {
            background: var(--bg)
        }

        .ctx-item.danger {
            color: var(--red)
        }

        .ctx-item.danger:hover {
            background: #fde7e9
        }
    </style>
</head>

<body>

    <!-- Topbar -->
    <div class="topbar">
        <a class="brand" href="/" target="_blank">
            <svg viewBox="0 0 24 24" fill="none">
                <rect x="3" y="2" width="15" height="20" rx="2" fill="#fff" />
                <rect x="3" y="2" width="6" height="20" rx="2" fill="#7719aa" />
                <text x="6" y="16" font-family="Segoe UI,sans-serif" font-size="12" font-weight="700" fill="#fff"
                    text-anchor="middle">N</text>
                <rect x="12" y="6" width="7" height="1.5" rx=".5" fill="#d2d0ce" />
                <rect x="12" y="10" width="5" height="1.5" rx=".5" fill="#d2d0ce" />
                <rect x="12" y="14" width="6" height="1.5" rx=".5" fill="#d2d0ce" />
            </svg>
            <span class="brand-name">OneNote</span>
        </a>
        <div class="search-box">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="6.5" cy="6.5" r="5" />
                <line x1="10.5" y1="10.5" x2="14" y2="14" stroke-linecap="round" />
            </svg>
            <input type="text" id="search-input" placeholder="Search Notebooks">
        </div>
        <div class="topbar-right">
            <div class="topbar-icon" title="Sticky Notes">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3">
                    <rect x="3" y="3" width="14" height="14" rx="1.5" />
                    <path d="M7 8h6M7 11h4" />
                </svg>
            </div>
            <div class="topbar-avatar" id="topbar-avatar">?</div>
        </div>
    </div>

    <!-- Login gate -->
    <div id="login-gate" class="gate hidden">
        <div style="font-size:16px;font-weight:600">Sign in to view notebooks</div>
        <div style="display:flex;gap:12px">
            <input type="text" id="gate-user" placeholder="admin"
                style="border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;font-size:13px;outline:none;width:180px;font-family:inherit">
            <input type="password" id="gate-pass" placeholder="Password"
                style="border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;font-size:13px;outline:none;width:180px;font-family:inherit">
            <button class="btn btn-primary" onclick="Notes.init.gateLogin()">Sign in</button>
        </div>
        <div id="gate-err" style="font-size:12px;color:var(--red);display:none"></div>
    </div>

    <!-- No token -->
    <div id="no-token" class="gate hidden">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="2" width="15" height="20" rx="2" fill="#d2d0ce" />
            <text x="10" y="15" font-family="sans-serif" font-size="10" font-weight="700" fill="#fff"
                text-anchor="middle">N</text>
        </svg>
        <div style="font-size:16px;font-weight:600">No Microsoft account linked</div>
        <div style="font-size:13px;color:var(--text2)">Link your account to access OneNote.</div>
        <a href="/link" class="btn btn-primary" style="margin-top:8px;text-decoration:none">Link my account</a>
    </div>

    <!-- Main layout -->
    <div class="main-wrap" id="notes-app" style="display:none">

        <!-- Notebook sidebar -->
        <div class="nb-sidebar" id="nb-sidebar">
            <div class="nb-list" id="nb-list">
                <div style="display:flex;align-items:center;justify-content:center;padding:40px">
                    <div class="spinner"></div>
                </div>
            </div>
            <div class="nb-add" onclick="Notes.actions.createNotebook()">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M8 3v10M3 8h10" />
                </svg>
                + New Section
            </div>
        </div>

        <!-- Section / page sidebar -->
        <div class="sec-sidebar" id="sec-sidebar">
            <div class="sec-add-page" onclick="Notes.actions.createPage()">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M8 3v10M3 8h10" />
                </svg>
                Add Page
            </div>
            <div class="sec-tabs" id="sec-tabs"></div>
            <div class="page-list" id="page-list">
                <div class="empty-state" style="padding:30px">
                    <div style="font-size:13px">Select a notebook</div>
                </div>
            </div>
        </div>

        <!-- Content area -->
        <div class="content" id="content-area">
            <div class="content-toolbar" id="content-toolbar">
                <button class="tb-btn" title="Bold" onclick="document.execCommand('bold')"><b>B</b></button>
                <button class="tb-btn" title="Italic" onclick="document.execCommand('italic')"><i>I</i></button>
                <button class="tb-btn" title="Underline" onclick="document.execCommand('underline')"><u>U</u></button>
                <button class="tb-btn" title="Strikethrough"
                    onclick="document.execCommand('strikeThrough')"><s>ab</s></button>
                <div class="tb-sep"></div>
                <button class="tb-btn" title="Bullet list" onclick="document.execCommand('insertUnorderedList')">
                    <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <circle cx="3" cy="4" r="1" fill="currentColor" />
                        <circle cx="3" cy="8" r="1" fill="currentColor" />
                        <circle cx="3" cy="12" r="1" fill="currentColor" />
                        <path d="M7 4h7M7 8h7M7 12h7" />
                    </svg>
                </button>
                <button class="tb-btn" title="Numbered list" onclick="document.execCommand('insertOrderedList')">
                    <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor"
                        stroke-width="1.5"><text x="1" y="5" font-size="4" fill="currentColor">1</text><text x="1" y="9"
                            font-size="4" fill="currentColor">2</text><text x="1" y="13" font-size="4"
                            fill="currentColor">3</text>
                        <path d="M7 4h7M7 8h7M7 12h7" />
                    </svg>
                </button>
                <div class="tb-sep"></div>
                <button class="tb-btn" title="Indent" onclick="document.execCommand('indent')">
                    <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M1 3h14M7 7h8M7 11h8M1 15h14M1 6l3 2.5L1 11" />
                    </svg>
                </button>
                <button class="tb-btn" title="Outdent" onclick="document.execCommand('outdent')">
                    <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M1 3h14M7 7h8M7 11h8M1 15h14M4 6l-3 2.5L4 11" />
                    </svg>
                </button>
                <div class="tb-sep"></div>
                <select id="tb-fontsize" onchange="document.execCommand('fontSize',false,this.value)"
                    style="border:1px solid var(--border);border-radius:var(--r);padding:3px 6px;font-size:12px;outline:none;font-family:inherit;color:var(--text2)">
                    <option value="2">10</option>
                    <option value="3" selected>14</option>
                    <option value="4">16</option>
                    <option value="5">20</option>
                    <option value="6">24</option>
                    <option value="7">36</option>
                </select>
            </div>
            <div class="content-body" id="content-body">
                <div class="empty-state">
                    <svg viewBox="0 0 80 80" fill="none">
                        <rect x="10" y="5" width="60" height="70" rx="4" fill="#f3f2f1" stroke="#d2d0ce"
                            stroke-width="2" />
                        <path d="M25 30h30M25 40h20M25 50h25" stroke="#d2d0ce" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                    <div style="font-size:14px;font-weight:600">Select a page to view</div>
                    <div style="font-size:12px">Choose a notebook and page from the left</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="ctx-menu hidden" id="ctx-menu"></div>

    <script src="/js/notes.js"></script>
</body>

</html>
