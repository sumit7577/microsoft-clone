<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Outlook</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #fff;
      --bg2: #f3f2f1;
      --bg3: #edebe9;
      --bg4: #e1dfdd;
      --border: #edebe9;
      --border2: #d2d0ce;
      --text: #323130;
      --text2: #605e5c;
      --text3: #a19f9d;
      --blue: #0078d4;
      --blue-light: #deecf9;
      --blue-dark: #106ebe;
      --green: #107c10;
      --red: #d13438;
      --r: 4px;
      --rl: 4px
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    /* ── Topbar ─────────────────────────────────────────────────────────────── */
    .topbar {
      background: #0078d4;
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none
    }

    .brand-name {
      font-size: 16px;
      font-weight: 600;
      color: #fff
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, .15);
      border: 1px solid rgba(255, 255, 255, .25);
      border-radius: var(--r);
      padding: 6px 12px;
      flex: 1;
      max-width: 400px
    }

    .search-box input {
      background: none;
      border: none;
      color: #fff;
      font-size: 13px;
      outline: none;
      width: 100%;
      font-family: inherit
    }

    .search-box input::placeholder {
      color: rgba(255, 255, 255, .7)
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .topbar-account {
      color: rgba(255, 255, 255, .9);
      font-size: 12px
    }

    .topbar-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────────── */
    .toolbar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 4px;
      flex-shrink: 0
    }

    .tb-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      border-radius: var(--r);
      font-size: 12px;
      cursor: pointer;
      border: 1px solid transparent;
      background: none;
      color: var(--text);
      transition: all .12s;
      font-family: inherit;
      white-space: nowrap
    }

    .tb-btn:hover {
      background: var(--bg2);
      border-color: var(--border2)
    }

    .tb-btn-primary {
      background: #0078d4;
      color: #fff;
      border-color: #0078d4;
      font-weight: 600
    }

    .tb-btn-primary:hover {
      background: #106ebe
    }

    .tb-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0
    }

    .tb-sep {
      width: 1px;
      height: 24px;
      background: var(--border2);
      margin: 0 4px
    }

    /* ── Buttons (overlays) ─────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--r);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: #fff;
      color: var(--text);
      transition: all .12s;
      font-family: inherit
    }

    .btn:hover {
      background: var(--bg2)
    }

    .btn-primary {
      background: #0078d4;
      border-color: #0078d4;
      color: #fff
    }

    .btn-primary:hover {
      background: #106ebe
    }

    .btn-send {
      background: #0078d4;
      border-color: #0078d4;
      color: #fff
    }

    .btn-send:hover {
      background: #106ebe
    }

    .btn-sm {
      padding: 4px 10px;
      font-size: 11px
    }

    .btn-danger {
      border-color: var(--red);
      color: var(--red)
    }

    .btn-danger:hover {
      background: #fde7e9
    }

    .pill {
      display: inline-flex;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600
    }

    .pill.blue {
      background: var(--blue-light);
      color: var(--blue)
    }

    /* ── Main 3-column layout ───────────────────────────────────────────────── */
    .mail-layout {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    /* ── Folder sidebar ─────────────────────────────────────────────────────── */
    .folder-panel {
      width: 200px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: #fff;
      overflow: hidden
    }

    .folder-panel-header {
      display: none
    }

    .folder-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0
    }

    .folder-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all .1s;
      font-size: 13px;
      color: var(--text2);
      position: relative
    }

    .folder-item:hover {
      background: var(--bg2);
      color: var(--text)
    }

    .folder-item.active {
      background: var(--blue-light);
      border-left-color: var(--blue);
      color: var(--blue);
      font-weight: 600
    }

    .folder-icon {
      font-size: 14px;
      width: 18px;
      text-align: center;
      flex-shrink: 0
    }

    .folder-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .folder-badge {
      margin-left: auto;
      background: var(--blue);
      color: #fff;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 600;
      min-width: 20px;
      text-align: center
    }

    .folder-delete {
      display: none;
      font-size: 10px;
      color: var(--text3);
      cursor: pointer;
      padding: 3px 5px;
      border-radius: 3px
    }

    .folder-item:hover .folder-delete {
      display: inline-block
    }

    .folder-delete:hover {
      color: var(--red);
      background: #fde7e9
    }

    .folder-sep {
      height: 1px;
      background: var(--border);
      margin: 6px 16px
    }

    .folder-actions {
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0
    }

    /* ── Inbox list ─────────────────────────────────────────────────────────── */
    .inbox-panel {
      width: 380px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: #fff;
      overflow: hidden
    }

    .inbox-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0
    }

    .inbox-label {
      font-size: 16px;
      font-weight: 600;
      color: var(--text)
    }

    .inbox-list {
      flex: 1;
      overflow-y: auto
    }

    /* Date group header */
    .date-group {
      padding: 10px 16px 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1
    }

    /* Mail item - Outlook style */
    .mail-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background .1s;
      position: relative
    }

    .mail-item:hover {
      background: #f5f5f5
    }

    .mail-item.active {
      background: var(--blue-light)
    }

    .mail-item.unread .mail-from {
      font-weight: 700;
      color: var(--text)
    }

    .mail-item.unread .mail-subject {
      font-weight: 700
    }

    /* Avatar */
    .mail-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
      text-transform: uppercase
    }

    /* Unread dot - now inline in sender name */
    .unread-dot {
      display: none
    }

    /* Mail content */
    .mail-content {
      flex: 1;
      min-width: 0
    }

    .mail-from-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px
    }

    .mail-from {
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0
    }

    .mail-date {
      font-size: 12px;
      color: var(--text3);
      white-space: nowrap;
      flex-shrink: 0
    }

    .mail-subject {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px
    }

    .mail-preview {
      font-size: 12px;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3
    }

    .attach-icon {
      font-size: 12px;
      vertical-align: middle;
      margin-left: 4px;
      color: var(--text3)
    }

    /* Pagination */
    .pagination-bar {
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
      align-items: center;
      background: #fff
    }

    .page-btn {
      padding: 4px 10px;
      font-size: 11px;
      border: 1px solid var(--border2);
      border-radius: var(--r);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font-family: inherit
    }

    .page-btn:hover {
      background: var(--bg2)
    }

    .page-btn:disabled {
      opacity: .4;
      cursor: default
    }

    /* ── Read panel ─────────────────────────────────────────────────────────── */
    .read-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff
    }

    .read-header {
      padding: 24px 32px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: #fff
    }

    .read-subject {
      font-size: 20px;
      font-weight: 600;
      color: #323130;
      margin-bottom: 12px;
      line-height: 1.4
    }

    .read-meta {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px
    }

    .meta-from {
      font-size: 14px;
      color: #323130
    }

    .meta-date {
      font-size: 12px;
      color: #605e5c;
      margin-left: auto
    }

    .read-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      background: #fff
    }

    .read-body-content {
      font-size: 14px;
      line-height: 1.6;
      color: #323130
    }

    .read-body-content a {
      color: #0078d4
    }

    .read-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .read-actions .tb-btn {
      font-size: 12px;
      border: 1px solid var(--border2)
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: #605e5c;
      background: #faf9f8
    }

    .empty-icon {
      font-size: 64px;
      color: var(--blue);
      opacity: .6
    }

    /* ── Compose overlay ────────────────────────────────────────────────────── */
    .compose-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .4);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 0 24px 24px
    }

    .compose-win {
      background: #fff;
      border: 1px solid var(--border2);
      border-radius: 8px;
      width: 500px;
      max-width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .15)
    }

    .compose-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg2);
      border-radius: 8px 8px 0 0;
      border-bottom: 1px solid var(--border)
    }

    .compose-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text)
    }

    .close-x {
      width: 24px;
      height: 24px;
      border-radius: var(--r);
      background: none;
      border: none;
      color: var(--text2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: all .12s
    }

    .close-x:hover {
      background: #fde7e9;
      color: var(--red)
    }

    .compose-body {
      padding: 16px
    }

    .compose-field {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      padding: 8px 0;
      margin-bottom: 4px
    }

    .compose-field label {
      font-size: 12px;
      color: var(--text2);
      width: 30px;
      flex-shrink: 0;
      font-weight: 600
    }

    .compose-field input {
      background: none;
      border: none;
      color: var(--text);
      font-size: 13px;
      outline: none;
      width: 100%;
      font-family: inherit
    }

    .compose-area {
      width: 100%;
      background: none;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      resize: none;
      line-height: 1.7;
      padding: 12px 0;
      min-height: 180px
    }

    .compose-footer {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid var(--border)
    }

    /* ── Move overlay ───────────────────────────────────────────────────────── */
    .move-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .4);
      z-index: 110;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .move-win {
      background: #fff;
      border: 1px solid var(--border2);
      border-radius: 8px;
      width: 340px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .15)
    }

    .move-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg2);
      border-radius: 8px 8px 0 0;
      border-bottom: 1px solid var(--border)
    }

    .move-folder-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0
    }

    .move-folder-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background .1s;
      font-size: 13px;
      color: var(--text)
    }

    .move-folder-item:hover {
      background: var(--bg2)
    }

    .move-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--text3)
    }

    /* ── Rules overlay ──────────────────────────────────────────────────────── */
    .rules-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .4);
      z-index: 110;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .rules-win {
      background: #fff;
      border: 1px solid var(--border2);
      border-radius: 8px;
      width: 560px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .15)
    }

    .rules-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg2);
      border-radius: 8px 8px 0 0;
      border-bottom: 1px solid var(--border)
    }

    .rules-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px
    }

    .rule-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px;
      margin-bottom: 8px
    }

    .rule-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px
    }

    .rule-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text)
    }

    .rule-detail {
      font-size: 11px;
      color: var(--text2);
      margin-top: 3px
    }

    .rule-create-form {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r);
      padding: 14px;
      margin-top: 12px
    }

    .rule-create-form label {
      font-size: 11px;
      color: var(--text2);
      font-weight: 600;
      display: block;
      margin: 8px 0 4px
    }

    .rule-create-form input,
    .rule-create-form select {
      width: 100%;
      background: #fff;
      border: 1px solid var(--border2);
      border-radius: var(--r);
      color: var(--text);
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
      font-family: inherit;
      margin-bottom: 2px
    }

    .rule-create-form input:focus,
    .rule-create-form select:focus {
      border-color: var(--blue)
    }

    .rules-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px
    }

    .pill.green {
      background: #dff6dd;
      color: var(--green);
      border: 1px solid #c8e6c9
    }

    .pill.gray {
      background: var(--bg2);
      color: var(--text2);
      border: 1px solid var(--border2)
    }

    /* ── Utilities ──────────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border2);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border: 1px solid var(--green);
      border-radius: var(--r);
      padding: 10px 18px;
      font-size: 12.5px;
      color: var(--green);
      z-index: 9999;
      transition: opacity .3s;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .1)
    }

    .hidden {
      display: none !important
    }

    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: #d2d0ce;
      border-radius: 3px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a19f9d
    }
  </style>
</head>

<body>

  <!-- ═══ Topbar ════════════════════════════════════════════════════════════ -->
  <div class="topbar">
    <a class="brand" href="/" target="_blank">
      <div class="brand-name">Outlook</div>
    </a>
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="rgba(255,255,255,.7)">
        <circle cx="6.5" cy="6.5" r="5" fill="none" stroke="currentColor" stroke-width="1.5" />
        <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
      </svg>
      <input type="text" id="search-input" placeholder="Search (press Enter)">
    </div>
    <div class="topbar-right">
      <span class="topbar-account" id="ms-account">Loading...</span>
      <div class="topbar-avatar" id="topbar-avatar">?</div>
    </div>
  </div>

  <!-- ═══ Toolbar ═══════════════════════════════════════════════════════════ -->
  <div class="toolbar" id="toolbar">
    <button class="tb-btn tb-btn-primary" onclick="Mail.compose.open()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 4l6 5 6-5" />
        <rect x="1" y="3" width="14" height="10" rx="1.5" />
      </svg>
      New mail
    </button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="Mail.reader.deleteMsg()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path
          d="M3 4h10M5.5 4V3a1 1 0 011-1h3a1 1 0 011 1v1M6 7v4M10 7v4M4 4l.7 8.8a1 1 0 001 .9h4.6a1 1 0 001-.9L12 4" />
      </svg>
      Delete
    </button>
    <button class="tb-btn" onclick="Mail.reader.archiveMsg()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="2" width="12" height="4" rx="1" />
        <path d="M3 6v7a1 1 0 001 1h8a1 1 0 001-1V6M6.5 9h3" />
      </svg>
      Archive
    </button>
    <button class="tb-btn" onclick="Mail.reader.moveToFolder()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M1 3h5l2 2h7v8a1 1 0 01-1 1H2a1 1 0 01-1-1V3z" />
      </svg>
      Move to
    </button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="Mail.reader.replyTo()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M6 3L2 7l4 4" />
        <path d="M2 7h8a4 4 0 014 4v1" />
      </svg>
      Reply
    </button>
    <button class="tb-btn" onclick="Mail.reader.replyAll()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 3L4 7l4 4" />
        <path d="M5 3L1 7l4 4" />
        <path d="M4 7h7a4 4 0 014 4v1" />
      </svg>
      Reply all
    </button>
    <button class="tb-btn" onclick="Mail.reader.forwardMsg()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M10 3l4 4-4 4" />
        <path d="M14 7H6a4 4 0 00-4 4v1" />
      </svg>
      Forward
    </button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="read-toggle-btn" onclick="Mail.reader.toggleRead()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 4l6 5 6-5" />
        <rect x="1" y="3" width="14" height="10" rx="1.5" />
      </svg>
      Read/Unread
    </button>
    <button class="tb-btn" onclick="Mail.rules.openPanel()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="8" cy="8" r="6" />
        <path d="M8 5v3l2 2" />
      </svg>
      Rules
    </button>
    <button class="tb-btn" onclick="Mail.inbox.loadInbox()" title="Refresh" style="margin-left:auto">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 8a6 6 0 0111.5-2M14 8a6 6 0 01-11.5 2" />
        <path d="M14 2v4h-4M2 14v-4h4" />
      </svg>
    </button>
  </div>

  <!-- ═══ Login gate ════════════════════════════════════════════════════════ -->
  <div id="login-gate" class="hidden"
    style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#faf9f8">
    <div style="font-size:16px;font-weight:600;color:var(--text)">Sign in to view mail</div>
    <div style="display:flex;gap:12px">
      <input type="text" id="gate-user" placeholder="admin"
        style="border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:13px;padding:8px 12px;outline:none;font-family:inherit;width:180px">
      <input type="password" id="gate-pass" placeholder="Password"
        style="border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:13px;padding:8px 12px;outline:none;font-family:inherit;width:180px">
      <button class="btn btn-primary" onclick="Mail.init.gateLogin()">Sign in</button>
    </div>
    <div id="gate-err" style="font-size:12px;color:var(--red);display:none"></div>
  </div>

  <!-- ═══ No token state ════════════════════════════════════════════════════ -->
  <div id="no-token" class="hidden"
    style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:#faf9f8">
    <div style="font-size:40px;opacity:.3">📭</div>
    <div style="font-size:16px;font-weight:600;color:var(--text)">No Microsoft account linked</div>
    <div style="font-size:13px;color:var(--text2)">Link your device first to access your mailbox.</div>
    <a href="/link" class="btn btn-primary" style="margin-top:8px;text-decoration:none">Link my account</a>
  </div>

  <!-- ═══ Mail layout (3-column) ════════════════════════════════════════════ -->
  <div class="mail-layout" id="mail-app" style="display:none">

    <!-- Column 1: Folder sidebar -->
    <div class="folder-panel">
      <div class="folder-panel-header"></div>
      <div class="folder-scroll" id="folder-list">
        <div style="display:flex;align-items:center;justify-content:center;padding:30px">
          <div class="spinner"></div>
        </div>
      </div>
      <div class="folder-actions">
        <button class="btn btn-sm" onclick="Mail.folders.create()" style="flex:1;width:100%">+ New folder</button>
      </div>
    </div>

    <!-- Column 2: Message list -->
    <div class="inbox-panel">
      <div class="inbox-header">
        <span class="inbox-label" id="inbox-label">Inbox</span>
        <span id="inbox-count" class="pill blue" style="display:none"></span>
      </div>
      <div class="inbox-list" id="inbox-list">
        <div style="display:flex;align-items:center;justify-content:center;padding:40px">
          <div class="spinner"></div>
        </div>
      </div>
      <div class="pagination-bar">
        <button class="page-btn" id="prev-btn" onclick="Mail.inbox.changePage(-1)" disabled>← Prev</button>
        <span style="flex:1;text-align:center;font-size:11px;color:var(--text3)" id="page-label">Page 1</span>
        <button class="page-btn" id="next-btn" onclick="Mail.inbox.changePage(1)">Next →</button>
      </div>
    </div>

    <!-- Column 3: Read panel -->
    <div class="read-panel" id="read-panel">
      <div class="empty-state" id="empty-state">
        <svg class="empty-icon" width="64" height="64" viewBox="0 0 64 64" fill="none">
          <rect x="8" y="16" width="48" height="36" rx="4" stroke="#0078d4" stroke-width="2.5" />
          <path d="M8 20l24 18 24-18" stroke="#0078d4" stroke-width="2.5" stroke-linecap="round" />
        </svg>
        <div style="font-size:18px;font-weight:400;color:#323130;margin-top:8px">Select an item to read</div>
        <div style="font-size:14px;color:#605e5c">Nothing is selected</div>
      </div>
      <div id="read-content" class="hidden" style="display:flex;flex-direction:column;height:100%">
        <div class="read-header">
          <div class="read-subject" id="read-subject">—</div>
          <div class="read-meta">
            <div>
              <div class="meta-from"><strong id="read-from-name"></strong> &lt;<span id="read-from-email"></span>&gt;
              </div>
              <div style="font-size:12px;color:var(--text2);margin-top:2px">To: <span id="read-to"></span></div>
              <div id="read-cc-row" style="font-size:12px;color:var(--text2);margin-top:1px;display:none">CC: <span
                  id="read-cc"></span></div>
            </div>
            <div class="meta-date" id="read-date">—</div>
          </div>
          <div class="read-actions">
            <button class="tb-btn" onclick="Mail.reader.replyTo()">↩ Reply</button>
            <button class="tb-btn" onclick="Mail.reader.replyAll()">↩↩ Reply All</button>
            <button class="tb-btn" onclick="Mail.reader.forwardMsg()">↪ Forward</button>
            <button class="tb-btn" onclick="Mail.reader.moveToFolder()">📁 Move</button>
            <button class="tb-btn" onclick="Mail.reader.archiveMsg()">📦 Archive</button>
            <button class="tb-btn" id="attach-badge" style="display:none">📎 Attachments</button>
          </div>
        </div>
        <div class="read-body" id="read-body">
          <div id="read-body-content" class="read-body-content"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Compose overlay ═══════════════════════════════════════════════════ -->
  <div class="compose-overlay hidden" id="compose-overlay">
    <div class="compose-win">
      <div class="compose-hdr">
        <span class="compose-title" id="compose-title">New message</span>
        <div class="close-x" onclick="Mail.compose.close()">✕</div>
      </div>
      <div class="compose-body">
        <div class="compose-field"><label>To</label><input type="text" id="c-to" placeholder="recipient@example.com">
        </div>
        <div class="compose-field"><label>CC</label><input type="text" id="c-cc" placeholder="Optional CC"></div>
        <div class="compose-field"><label>Re</label><input type="text" id="c-subject" placeholder="Subject"></div>
        <textarea class="compose-area" id="c-body" placeholder="Write your message..."></textarea>
      </div>
      <div class="compose-footer">
        <button class="btn btn-send" onclick="Mail.compose.send()" id="send-btn">Send</button>
        <button class="btn" onclick="Mail.compose.close()">Discard</button>
      </div>
    </div>
  </div>

  <!-- ═══ Move-to-folder overlay ════════════════════════════════════════════ -->
  <div class="move-overlay hidden" id="move-overlay">
    <div class="move-win">
      <div class="move-hdr">
        <span style="font-size:14px;font-weight:600">Move to folder</span>
        <div class="close-x" onclick="Mail.actions.closeMoveDialog()">✕</div>
      </div>
      <div class="move-folder-list" id="move-folder-list"></div>
    </div>
  </div>

  <!-- ═══ Rules overlay ════════════════════════════════════════════════════= -->
  <div class="rules-overlay hidden" id="rules-overlay">
    <div class="rules-win">
      <div class="rules-hdr">
        <span style="font-size:14px;font-weight:600">Inbox Rules</span>
        <div class="close-x" onclick="Mail.rules.closePanel()">✕</div>
      </div>
      <div class="rules-body">
        <div id="rules-list">
          <div style="display:flex;align-items:center;justify-content:center;padding:30px">
            <div class="spinner"></div>
          </div>
        </div>
        <div id="rule-create-form" class="rule-create-form hidden">
          <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px">New Rule</div>
          <label>Rule name</label>
          <input type="text" id="rule-name" placeholder="e.g. Auto-delete newsletters">
          <label>If from contains</label>
          <input type="text" id="rule-from" placeholder="e.g. newsletter@example.com">
          <label>If subject contains</label>
          <input type="text" id="rule-subject" placeholder="e.g. Weekly digest">
          <label>Action</label>
          <select id="rule-action">
            <option value="delete">Auto-delete (move to trash)</option>
            <option value="read">Mark as read</option>
            <option value="move">Move to folder</option>
          </select>
          <label>Move to folder (if action is "move")</label>
          <select id="rule-move-folder">
            <option value="">— Don't move —</option>
          </select>
          <div style="display:flex;gap:8px;margin-top:12px">
            <button class="btn btn-send" id="rule-submit-btn" onclick="Mail.rules.submitCreate()">Create Rule</button>
            <button class="btn" onclick="Mail.rules.closeCreateForm()">Cancel</button>
          </div>
        </div>
      </div>
      <div class="rules-footer">
        <button class="btn btn-primary" onclick="Mail.rules.openCreateForm()">+ New Rule</button>
      </div>
    </div>
  </div>

  <!-- ═══ JS Modules (load order matters) ═══════════════════════════════════ -->
  <script src="/js/ui.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/folders.js"></script>
  <script src="/js/inbox.js"></script>
  <script src="/js/reader.js"></script>
  <script src="/js/compose.js"></script>
  <script src="/js/actions.js"></script>
  <script src="/js/rules.js"></script>
  <script src="/js/init.js"></script>
</body>

</html>
