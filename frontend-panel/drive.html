<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>OneDrive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #f5f5f5;
            --bg2: #f0f0f0;
            --bg3: #e8e8e8;
            --border: #e1dfdd;
            --border2: #d2d0ce;
            --text: #242424;
            --text2: #616161;
            --text3: #8a8886;
            --blue: #0078d4;
            --blue-light: #deecf9;
            --blue-hover: #106ebe;
            --green: #107c10;
            --red: #d13438;
            --r: 4px;
        }

        html,
        body {
            height: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            font-size: 14px;
            color: var(--text);
            background: #fff
        }

        body {
            display: flex;
            flex-direction: column
        }

        /* ── Topbar ──────────────────────────────────── */
        .topbar {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            min-width: 160px
        }

        .brand svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0
        }

        .brand-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text)
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 5px 12px;
            flex: 1;
            max-width: 480px;
            margin: 0 auto;
        }

        .search-box:focus-within {
            border-color: var(--blue);
            background: #fff;
            box-shadow: 0 0 0 1px var(--blue)
        }

        .search-box svg {
            width: 16px;
            height: 16px;
            color: var(--text3);
            flex-shrink: 0
        }

        .search-box input {
            background: none;
            border: none;
            font-size: 13px;
            outline: none;
            width: 100%;
            font-family: inherit;
            color: var(--text)
        }

        .search-box input::placeholder {
            color: var(--text3)
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 200px;
            justify-content: flex-end
        }

        .topbar-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text2);
        }

        .topbar-icon:hover {
            background: var(--bg2)
        }

        .topbar-icon svg {
            width: 20px;
            height: 20px
        }

        .topbar-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        /* ── Main split ──────────────────────────────── */
        .main-wrap {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        /* ── Sidebar ─────────────────────────────────── */
        .sidebar {
            width: 228px;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            background: #fff;
            display: flex;
            flex-direction: column;
            padding: 12px 0;
            overflow-y: auto;
        }

        .sidebar-add {
            margin: 0 12px 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: #0078d4;
            color: #fff;
            transition: all .15s;
            width: auto;
        }

        .sidebar-add:hover {
            background: #106ebe;
        }

        .sidebar-add svg {
            width: 16px;
            height: 16px;
            color: #fff
        }

        .sidebar-user {
            padding: 4px 16px 12px;
            font-size: 12px;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-section {
            padding: 8px 16px 4px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 16px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text2);
            border-radius: 4px;
            margin: 1px 8px;
            transition: all .1s;
        }

        .sidebar-item:hover {
            background: var(--bg2);
            color: var(--text)
        }

        .sidebar-item.active {
            background: var(--blue-light);
            color: var(--blue);
            font-weight: 600
        }

        .sidebar-item svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0
        }

        .sidebar-sep {
            height: 1px;
            background: var(--border);
            margin: 6px 16px
        }

        .quota-bar {
            padding: 12px 16px;
            margin-top: auto;
            border-top: 1px solid var(--border)
        }

        .quota-label {
            font-size: 11px;
            color: var(--text3);
            margin-bottom: 6px
        }

        .quota-track {
            height: 4px;
            background: var(--bg3);
            border-radius: 2px;
            overflow: hidden
        }

        .quota-fill {
            height: 100%;
            background: var(--blue);
            border-radius: 2px;
            transition: width .3s
        }

        .quota-text {
            font-size: 11px;
            color: var(--text2);
            margin-top: 4px
        }

        /* ── Content area ────────────────────────────── */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #fff
        }

        .content-header {
            display: flex;
            align-items: center;
            padding: 16px 24px 8px;
            flex-shrink: 0;
            gap: 12px;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            min-width: 0
        }

        .bc-item {
            cursor: pointer;
            color: var(--blue);
            text-decoration: none;
            font-weight: 400;
            font-size: 14px;
            padding: 2px 4px;
            border-radius: var(--r);
        }

        .bc-item:hover {
            background: var(--blue-light)
        }

        .bc-sep {
            color: var(--text3);
            font-size: 12px;
            margin: 0 2px
        }

        .bc-current {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 4px
        }

        .ha-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 10px;
            border-radius: var(--r);
            font-size: 13px;
            cursor: pointer;
            border: 1px solid transparent;
            background: none;
            color: var(--text);
            transition: all .12s;
            font-family: inherit;
            white-space: nowrap;
        }

        .ha-btn:hover {
            background: var(--bg2);
            border-color: var(--border)
        }

        .ha-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0
        }

        /* ── File table ──────────────────────────────── */
        .file-header {
            display: flex;
            align-items: center;
            padding: 8px 24px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
            flex-shrink: 0;
            user-select: none;
        }

        .file-header .col-name {
            flex: 1;
            min-width: 0
        }

        .file-header .col-modified {
            width: 160px
        }

        .file-header .col-sharing {
            width: 100px
        }

        .file-header .col-size {
            width: 90px;
            text-align: right
        }

        .file-header .col-actions {
            width: 40px
        }

        .file-list {
            flex: 1;
            overflow-y: auto
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 8px 24px;
            border-bottom: 1px solid #f3f2f1;
            cursor: pointer;
            transition: background .08s;
        }

        .file-item:hover {
            background: #f5f5f5
        }

        .file-item.selected {
            background: var(--blue-light)
        }

        .file-icon-wrap {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0
        }

        .file-icon-wrap svg {
            width: 28px;
            height: 28px
        }

        .file-icon-wrap .folder-svg {
            color: #f0c040
        }

        .col-name {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center
        }

        .file-name {
            font-size: 13px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .file-path {
            font-size: 11px;
            color: var(--text3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 1px
        }

        .col-modified {
            width: 160px;
            font-size: 12px;
            color: var(--text2)
        }

        .col-sharing {
            width: 100px;
            font-size: 12px;
            color: var(--text2)
        }

        .col-size {
            width: 90px;
            font-size: 12px;
            color: var(--text2);
            text-align: right
        }

        .col-actions {
            width: 40px;
            display: flex;
            justify-content: flex-end
        }

        .action-dot {
            width: 28px;
            height: 28px;
            border-radius: var(--r);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text3);
            font-size: 16px;
            border: none;
            background: none;
        }

        .file-item:hover .action-dot {
            display: flex
        }

        .action-dot:hover {
            background: var(--bg3);
            color: var(--text)
        }

        /* ── Context menu ────────────────────────────── */
        .ctx-menu {
            position: fixed;
            background: #fff;
            border: 1px solid var(--border2);
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .12);
            min-width: 200px;
            z-index: 200;
            padding: 4px 0;
        }

        .ctx-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            font-size: 13px;
            color: var(--text);
            cursor: pointer;
            transition: background .1s;
        }

        .ctx-item:hover {
            background: var(--bg2)
        }

        .ctx-item.danger {
            color: var(--red)
        }

        .ctx-item.danger:hover {
            background: #fde7e9
        }

        .ctx-item svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0
        }

        .ctx-sep {
            height: 1px;
            background: var(--border);
            margin: 4px 8px
        }

        /* ── Empty state ─────────────────────────────── */
        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            color: var(--text2);
            padding: 60px;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            color: var(--border2);
            margin-bottom: 8px
        }

        /* ── Rename overlay ──────────────────────────── */
        .rename-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .4);
            z-index: 150;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rename-win {
            background: #fff;
            border-radius: 8px;
            padding: 24px;
            width: 380px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .15)
        }

        .rename-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px
        }

        .rename-input {
            width: 100%;
            border: 1px solid var(--border2);
            border-radius: var(--r);
            padding: 8px 12px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }

        .rename-input:focus {
            border-color: var(--blue)
        }

        .rename-btns {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            justify-content: flex-end
        }

        /* ── Buttons ─────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: var(--r);
            font-size: 13px;
            cursor: pointer;
            border: 1px solid var(--border2);
            background: #fff;
            color: var(--text);
            transition: all .12s;
            font-family: inherit;
        }

        .btn:hover {
            background: var(--bg2)
        }

        .btn-primary {
            background: var(--blue);
            border-color: var(--blue);
            color: #fff
        }

        .btn-primary:hover {
            background: var(--blue-hover)
        }

        /* ── Login / no-token ────────────────────────── */
        .gate {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            background: #faf9f8;
        }

        /* ── Utils ───────────────────────────────────── */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border2);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border: 1px solid var(--green);
            border-radius: var(--r);
            padding: 10px 18px;
            font-size: 12.5px;
            color: var(--green);
            z-index: 9999;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .1);
        }

        .hidden {
            display: none !important
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: #d2d0ce;
            border-radius: 3px
        }
    </style>
</head>

<body>

    <!-- Topbar -->
    <div class="topbar">
        <div class="topbar-icon" title="Apps" style="margin-right:8px">
            <svg viewBox="0 0 20 20" fill="currentColor"><rect x="2" y="2" width="4" height="4" rx=".5"/><rect x="8" y="2" width="4" height="4" rx=".5"/><rect x="14" y="2" width="4" height="4" rx=".5"/><rect x="2" y="8" width="4" height="4" rx=".5"/><rect x="8" y="8" width="4" height="4" rx=".5"/><rect x="14" y="8" width="4" height="4" rx=".5"/><rect x="2" y="14" width="4" height="4" rx=".5"/><rect x="8" y="14" width="4" height="4" rx=".5"/><rect x="14" y="14" width="4" height="4" rx=".5"/></svg>
        </div>
        <a class="brand" href="/" target="_blank">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M14.5 3C11.47 3 9 5.47 9 8.5c0 .36.04.72.1 1.06C5.69 9.96 3 12.91 3 16.5 3 20.09 5.91 23 9.5 23h10c2.49 0 4.5-2.01 4.5-4.5 0-2.13-1.48-3.91-3.46-4.38C20.82 12.22 21 10.38 21 9.5 21 5.91 18.09 3 14.5 3z" fill="#0078d4"/>
                <path d="M9.5 23c-3.59 0-6.5-2.91-6.5-6.5 0-3.25 2.39-5.94 5.5-6.42C8.82 8.76 9 7.64 9 7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 .87-.15 2-1 3.62C20.52 11.1 22 12.87 22 15c0 2.49-2.01 4.5-4.5 4.5" fill="none" stroke="#fff" stroke-width=".5" opacity=".3"/>
            </svg>
            <span class="brand-name">OneDrive</span>
        </a>
        <div class="search-box">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="6.5" cy="6.5" r="5" />
                <line x1="10.5" y1="10.5" x2="14" y2="14" stroke-linecap="round" />
            </svg>
            <input type="text" id="search-input" placeholder="Let's find some stuff">
            <span style="color:var(--text3);font-size:12px;white-space:nowrap;border-left:1px solid var(--border);padding-left:8px;cursor:pointer">All files ▾</span>
        </div>
        <div class="topbar-right">
            <div class="topbar-icon" title="Notifications">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2a5 5 0 015 5v3l2 2H3l2-2V7a5 5 0 015-5zM8 17a2 2 0 004 0"/></svg>
            </div>
            <div class="topbar-icon" title="Settings">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="2"/><path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.9 3.9l1.4 1.4M14.7 14.7l1.4 1.4M3.9 16.1l1.4-1.4M14.7 5.3l1.4-1.4"/></svg>
            </div>
            <div class="topbar-icon" title="Help">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="8"/><path d="M7.5 7.5a2.5 2.5 0 014.5 1.5c0 1.5-2 2-2 3"/><circle cx="10" cy="14.5" r=".5" fill="currentColor"/></svg>
            </div>
            <div class="topbar-avatar" id="topbar-avatar" title="">?</div>
        </div>
    </div>

    <!-- Login gate -->
    <div id="login-gate" class="gate hidden">
        <div style="font-size:16px;font-weight:600">Sign in to view files</div>
        <div style="display:flex;gap:12px">
            <input type="text" id="gate-user" placeholder="admin"
                style="border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;font-size:13px;outline:none;width:180px;font-family:inherit">
            <input type="password" id="gate-pass" placeholder="Password"
                style="border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;font-size:13px;outline:none;width:180px;font-family:inherit">
            <button class="btn btn-primary" onclick="Drive.init.gateLogin()">Sign in</button>
        </div>
        <div id="gate-err" style="font-size:12px;color:var(--red);display:none"></div>
    </div>

    <!-- No token -->
    <div id="no-token" class="gate hidden">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
            <path
                d="M14.5 3C11.47 3 9 5.47 9 8.5c0 .36.04.72.1 1.06C5.69 9.96 3 12.91 3 16.5 3 20.09 5.91 23 9.5 23h10c2.49 0 4.5-2.01 4.5-4.5 0-2.13-1.48-3.91-3.46-4.38C20.82 12.22 21 10.38 21 9.5 21 5.91 18.09 3 14.5 3z"
                fill="#d2d0ce" />
        </svg>
        <div style="font-size:16px;font-weight:600">No Microsoft account linked</div>
        <div style="font-size:13px;color:var(--text2)">Link your account to access OneDrive files.</div>
        <a href="/link" class="btn btn-primary" style="margin-top:8px;text-decoration:none">Link my account</a>
    </div>

    <!-- Main layout -->
    <div class="main-wrap" id="drive-app" style="display:none">
        <!-- Sidebar -->
        <div class="sidebar">
            <button class="sidebar-add" onclick="Drive.actions.newFolder()">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 3v10M3 8h10" />
                </svg>
                Add New
            </button>
            <div class="sidebar-user" id="sidebar-user"></div>
            <div class="sidebar-item" data-view="home" onclick="Drive.nav.goRoot()">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 10l7-7 7 7"/><path d="M5 8v8a1 1 0 001 1h3v-4h2v4h3a1 1 0 001-1V8"/></svg>
                Home
            </div>
            <div class="sidebar-item active" data-view="files" onclick="Drive.nav.goRoot()">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4">
                    <path d="M3 5l3-2h4l2 2h5a1 1 0 011 1v9a1 1 0 01-1 1H3a1 1 0 01-1-1V5z" />
                </svg>
                My files
            </div>
            <div class="sidebar-item" data-view="shared">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="7" cy="8" r="3"/><circle cx="14" cy="8" r="2.5"/><path d="M1 17c0-3 2.5-5 6-5s6 2 6 5"/><path d="M13 12c2.5 0 5 1.5 5 4"/></svg>
                Shared
            </div>
            <div class="sidebar-item" data-view="favorites">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M10 2l2.4 5 5.6.8-4 3.9 1 5.5L10 14.4 4.9 17.2l1-5.5-4-3.9 5.6-.8z"/></svg>
                Favorites
            </div>
            <div class="sidebar-item" data-view="recycle">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M4 6h12M7 6V4a1 1 0 011-1h4a1 1 0 011 1v2M5 6l.7 10.5a1.5 1.5 0 001.5 1.5h5.6a1.5 1.5 0 001.5-1.5L15 6"/></svg>
                Recycle bin
            </div>
            <div class="sidebar-sep"></div>
            <div class="sidebar-section">Browse by</div>
            <div class="sidebar-item">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="10" cy="7" r="4"/><path d="M3 18c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>
                People
            </div>
            <div class="sidebar-item">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="3" width="16" height="14" rx="1.5"/><path d="M2 7h16"/><circle cx="10" cy="12" r="2"/></svg>
                Meetings
            </div>
            <div class="sidebar-sep"></div>
            <div class="sidebar-item" data-view="recent" onclick="Drive.nav.goRecent()">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="10" cy="10" r="7"/><path d="M10 6v4l3 2"/></svg>
                Recent
            </div>
            <div class="sidebar-sep"></div>
            <div class="sidebar-section">Apps</div>
            <div class="sidebar-item" onclick="window.location='/mail'">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="4" width="16" height="12" rx="1"/><path d="M2 4l8 6 8-6"/></svg>
                Mail
            </div>
            <div class="quota-bar" id="quota-bar">
                <div class="quota-label">Storage</div>
                <div class="quota-track">
                    <div class="quota-fill" id="quota-fill" style="width:0%"></div>
                </div>
                <div class="quota-text" id="quota-text">Loading...</div>
            </div>
        </div>

        <!-- Content area -->
        <div class="content">
            <div class="content-header">
                <div class="breadcrumb" id="breadcrumb">
                    <span class="bc-current">My files</span>
                </div>
                <div class="header-actions" id="header-actions">
                    <button class="ha-btn" onclick="Drive.actions.downloadSelected()" title="Download">
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M8 2v8M5 7l3 3 3-3" />
                            <path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" />
                        </svg>
                    </button>
                    <button class="ha-btn" onclick="Drive.actions.deleteSelected()" title="Delete">
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path
                                d="M3 4h10M5.5 4V3a1 1 0 011-1h3a1 1 0 011 1v1M6 7v4M10 7v4M4 4l.7 8.8a1 1 0 001 .9h4.6a1 1 0 001-.9L12 4" />
                        </svg>
                    </button>
                    <button class="ha-btn" onclick="Drive.actions.renameSelected()" title="Rename">
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M11.5 1.5l3 3L5 14H2v-3l9.5-9.5z" />
                        </svg>
                    </button>
                    <button class="ha-btn" onclick="Drive.nav.refresh()" title="Refresh" style="margin-left:4px">
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M2 8a6 6 0 0111.5-2M14 8a6 6 0 01-11.5 2" />
                            <path d="M14 2v4h-4M2 14v-4h4" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="file-header">
                <div class="col-name">Name</div>
                <div class="col-modified">Modified</div>
                <div class="col-sharing">Sharing</div>
                <div class="col-size">Size</div>
                <div class="col-actions"></div>
            </div>
            <div class="file-list" id="file-list">
                <div style="display:flex;align-items:center;justify-content:center;padding:60px">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Rename dialog -->
    <div class="rename-overlay hidden" id="rename-overlay">
        <div class="rename-win">
            <div class="rename-title" id="rename-title">Rename</div>
            <input class="rename-input" id="rename-input" type="text" placeholder="New name">
            <div class="rename-btns">
                <button class="btn" onclick="Drive.actions.closeRename()">Cancel</button>
                <button class="btn btn-primary" onclick="Drive.actions.submitRename()">Rename</button>
            </div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="ctx-menu hidden" id="ctx-menu"></div>

    <script src="/js/drive.js"></script>
</body>

</html>
