version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
#  NexCP — Backend API + React Frontend
#  Expects an external nginx-proxy + acme-companion on the `sumit_proxy` network.
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend (Node.js API) ───────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: nexcp-backend
    expose:
      - "3000"
    env_file: ./backend/.env
    environment:
      VIRTUAL_HOST: ${API_DOMAIN}
      VIRTUAL_PORT: 3000
      LETSENCRYPT_HOST: ${API_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
      PORT: 3000
    volumes:
      - ./backend/data:/app/data
      - ./backend/tokens:/app/tokens
    restart: unless-stopped
    networks:
      - proxy
      - internal

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexcp-frontend
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: ${PANEL_DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${PANEL_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    name: sumit_proxy
    external: true
  internal:
    driver: bridge
    internal: true
