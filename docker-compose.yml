# ──────────────────────────────────────────────────────────────────────────────
#  NexCP — Full Stack: Reverse Proxy + SSL + Backend API + React Frontend
#  Single `docker compose up -d --build` brings up everything.
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
    restart: unless-stopped
    networks:
      - proxy

  # ── Let's Encrypt SSL ──────────────────────────────────────────────────────
  acme-companion:
    image: nginxproxy/acme-companion
    container_name: acme-companion
    volumes_from:
      - nginx-proxy
    volumes:
      - certs:/etc/nginx/certs
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DEFAULT_EMAIL: ${LETSENCRYPT_EMAIL:-admin@yourdomain.com}
    depends_on:
      - nginx-proxy
    restart: unless-stopped
    networks:
      - proxy

  # ── Backend (Node.js API) ───────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: nexcp-backend
    expose:
      - "3000"
    env_file: ./backend/.env
    environment:
      VIRTUAL_HOST: ${API_DOMAIN}
      VIRTUAL_PORT: 3000
      LETSENCRYPT_HOST: ${API_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
      HOST_PROJECT_DIR: ${HOST_PROJECT_DIR:-/opt/nexcp5}
      DOCKER_NETWORK: nexcp_proxy
      PORT: 3000
    volumes:
      - ./backend/data:/app/data
      - ./backend/tokens:/app/tokens
      - ./frontend-link:/frontend-link
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - nginx-proxy
    restart: unless-stopped
    networks:
      - proxy
      - internal

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://${API_DOMAIN}
    container_name: nexcp-frontend
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: ${PANEL_DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${PANEL_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
    depends_on:
      - nginx-proxy
    restart: unless-stopped
    networks:
      - proxy

volumes:
  certs:
  vhost:
  html:
  acme:

networks:
  proxy:
    name: nexcp_proxy
    driver: bridge
  internal:
    driver: bridge
    internal: true
